name: chapter_reader
description: "A Flutter web app for Sadguru Shri Lakshmikant Maharaj Parayan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase packages for Realtime Sync & Mobile OTP Authentication
  firebase_core: ^3.10.0
  firebase_database: ^11.3.0
  firebase_auth: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  peanut: ^6.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/chapters/
    - assets/images/